repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -   id: check-yaml
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
-   repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
    -   id: black
-   repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
    -   id: flake8
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
    -   id: mypy
        args: [--explicit-package-bases, --ignore-missing-imports, --namespace-packages]
        exclude: ^services/
        additional_dependencies: [pydantic, sqlalchemy, types-requests, types-setuptools]
-   repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.0.0
    hooks:
    -   id: eslint
        files: \.(js|ts|tsx)$
        additional_dependencies:
        - eslint@9.0.0
        - typescript@5.4.5
        - typescript-eslint@8.0.0
        - globals@15.0.0
