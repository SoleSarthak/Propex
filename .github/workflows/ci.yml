name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          export PATH="$HOME/.local/bin:$PATH"

      - name: Lint Python
        run: |
          poetry install
          poetry run flake8 .
          poetry run black --check .

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Lint Frontend
        run: |
          cd apps/web-dashboard
          npm install
          npm run lint
