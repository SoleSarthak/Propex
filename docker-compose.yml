services:
  # Database: PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: propex-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: propex
      POSTGRES_PASSWORD: propex_password
      POSTGRES_DB: propex_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propex -d propex_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cache: Redis
  redis:
    image: redis:7-alpine
    container_name: propex-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Graph DB: Neo4j
  neo4j:
    image: neo4j:5-community
    container_name: propex-neo4j
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      NEO4J_AUTH: neo4j/propex_password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  # Message Bus: Redpanda
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.11
    container_name: propex-redpanda
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr 0.0.0.0:33145
      - --advertise-rpc-addr redpanda:33145
    ports:
      - "19092:19092"
      - "18082:18082"
      - "18081:18081"
    volumes:
      - redpanda_data:/var/lib/redpanda

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.4.3
    container_name: propex-redpanda-console
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      - redpanda

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.11
    container_name: propex-redpanda-init
    command: >
      bash -c "sleep 10 && rpk topic create cve.raw resolver.npm resolver.pypi resolver.maven dependency.resolved --brokers redpanda:9092"
    depends_on:
      - redpanda

  # Object Storage: MinIO
  minio:
    image: minio/minio:latest
    container_name: propex-minio
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    environment:
      MINIO_ROOT_USER: propex_admin
      MINIO_ROOT_PASSWORD: propex_password
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # Observability: Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: propex-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  # Observability: Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: propex-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/etc/grafana/dashboards

  # Observability: Jaeger
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: propex-jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

  # Microservice: CVE Ingestion
  cve-ingestion:
    build:
      context: .
      dockerfile: services/cve-ingestion/Dockerfile
    container_name: propex-cve-ingestion
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://propex:propex_password@postgres:5432/propex_db
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - NVD_API_KEY=${NVD_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
    networks:
      - default

  # Microservice: npm Resolver
  npm-resolver:
    build:
      context: .
      dockerfile: services/npm-resolver/Dockerfile
    container_name: propex-npm-resolver
    ports:
      - "8001:8001"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=propex_password
      - LIBRARIES_IO_API_KEY=${LIBRARIES_IO_API_KEY}
    depends_on:
      - redpanda
      - neo4j
    networks:
      - default

  # Microservice: Dependency Coordinator
  coordinator:
    build:
      context: .
      dockerfile: services/coordinator/Dockerfile
    container_name: propex-coordinator
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql+asyncpg://propex:propex_password@postgres:5432/propex_db
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
    networks:
      - default

  # Microservice: PyPI Resolver
  pypi-resolver:
    build:
      context: .
      dockerfile: services/pypi-resolver/Dockerfile
    container_name: propex-pypi-resolver
    ports:
      - "8003:8003"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=propex_password
      - LIBRARIES_IO_API_KEY=${LIBRARIES_IO_API_KEY}
    depends_on:
      - redpanda
      - neo4j
    networks:
      - default

  # Microservice: Maven Resolver
  maven-resolver:
    build:
      context: .
      dockerfile: services/maven-resolver/Dockerfile
    container_name: propex-maven-resolver
    ports:
      - "8004:8004"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=propex_password
    depends_on:
      - redpanda
      - neo4j
    networks:
      - default

  # Microservice: Impact Analyzer (ML Scoring)
  impact-analyzer:
    build:
      context: .
      dockerfile: services/impact-analyzer/Dockerfile
    container_name: propex-impact-analyzer
    ports:
      - "8005:8005"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=propex_password
      - DATABASE_URL=postgresql+asyncpg://propex:propex_password@postgres:5432/propex_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
      neo4j:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - default

  # Microservice: API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: propex-api-gateway
    ports:
      - "8006:8006"
    environment:
      - DATABASE_URL=postgresql+asyncpg://propex:propex_password@postgres:5432/propex_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default

  # Microservice: Patch Drafter (Gemini AI)
  patch-drafter:
    build:
      context: .
      dockerfile: services/patch-drafter/Dockerfile
    container_name: propex-patch-drafter
    ports:
      - "8007:8007"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://propex:propex_password@postgres:5432/propex_db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      redpanda:
        condition: service_started
    networks:
      - default

  # Microservice: Issue Creator (GitHub REST API)
  issue-creator:
    build:
      context: .
      dockerfile: services/issue-creator/Dockerfile
    container_name: propex-issue-creator
    ports:
      - "8008:8008"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://propex:propex_password@postgres:5432/propex_db
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_TOKEN_1=${GITHUB_TOKEN_1:-}
      - GITHUB_TOKEN_2=${GITHUB_TOKEN_2:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      redpanda:
        condition: service_started
    networks:
      - default

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  redpanda_data:
  minio_data:
  prometheus_data:
  grafana_data:

