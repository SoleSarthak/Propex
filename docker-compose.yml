services:
  # Database: PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: propex-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: propex
      POSTGRES_PASSWORD: propex_password
      POSTGRES_DB: propex_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propex -d propex_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cache: Redis
  redis:
    image: redis:7-alpine
    container_name: propex-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Graph DB: Neo4j
  neo4j:
    image: neo4j:5-community
    container_name: propex-neo4j
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      NEO4J_AUTH: neo4j/propex_password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  # Message Bus: Redpanda
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.11
    container_name: propex-redpanda
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr 0.0.0.0:33145
      - --advertise-rpc-addr redpanda:33145
    ports:
      - "19092:19092"
      - "18082:18082"
      - "18081:18081"
    volumes:
      - redpanda_data:/var/lib/redpanda

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.4.3
    container_name: propex-redpanda-console
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      - redpanda

  # Object Storage: MinIO
  minio:
    image: minio/minio:latest
    container_name: propex-minio
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    environment:
      MINIO_ROOT_USER: propex_admin
      MINIO_ROOT_PASSWORD: propex_password
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # Observability: Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: propex-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  # Observability: Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: propex-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana

  # Observability: Jaeger
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: propex-jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  redpanda_data:
  minio_data:
  prometheus_data:
  grafana_data:
